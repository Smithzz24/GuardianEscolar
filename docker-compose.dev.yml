services:
  backend:
    container_name: backend_container_dev
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AllowedOrigins=http://localhost:4200
    volumes:
      - ./dvlp-back/src/backend:/app
    command: dotnet watch run

