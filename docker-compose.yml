services:
  db:
    container_name: app-db
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: 12guardian34
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  liquibase: 
    image: liquibase/liquibase:5.0+
    depends_on:
      - db:
          condition: service_healthy
    environment:
      - name=value
    
volumes:
  postgres-data:
    driver: local
