services:
  liquibase: 
    container_name: liquibase
    build:
      context: ./liquibase
      dockerfile: Dockerfile
    volumes:
      - ./liquibase/logs:/liquibase/logs
    networks:
      - default
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${LIQUIBASE_USER}
      - DB_PASS=${LIQUIBASE_PASS}
  
  # app-web-frontend:
  #   build: ./dvlp-front/dvlp-web
  #   container_name: app
  #   ports:
  #     - 4200:80

  app-backend:
    build: ./dvlp-back
    container_name: app-backend
    ports:
      - 5000:80
    networks:
      - default
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${LIQUIBASE_USER}
      - DB_PASS=${LIQUIBASE_PASS}
    # depends_on:
    #   liquibase:
    #     condition: service_completed_successfully


volumes:
  postgres-data:
    driver: local

networks:
  default:
    name: school-guardian-network
