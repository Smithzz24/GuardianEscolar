<!-- update-record.html -->
<div class="modal-overlay" (click)="cerrar()">
  <div class="modal" (click)="$event.stopPropagation()">

    <!-- HEADER -->
    <div class="modal__header">
      <h2 class="modal__title">{{ config.title }}</h2>
    </div>

    <!-- HEADER INFO -->
    <div class="modal__header-info">
      <div class="modal__logo">
        <mat-icon>{{ config.icon }}</mat-icon>
      </div>
      <p class="modal__name">{{ displayName }}</p>
      <p class="modal__type" *ngIf="displayType">{{ displayType }}</p>
    </div>

    <!-- GRID DE INFORMACIÓN / FORMULARIO -->
    <div class="modal__info-grid">

      <ng-container *ngFor="let row of groupedFields">

        <!-- FILA DE DOS CAMPOS -->
        <ng-container *ngIf="isArray(row); else fullRow">

          <!-- Campo izquierdo -->
          <div class="modal__info-item modal__info-item--half">
            <label class="modal__info-label">
              {{ asArray(row)[0].label }}
            </label>

            <ng-container [ngSwitch]="asArray(row)[0].type">
              <select
                *ngSwitchCase="'select'"
                class="modal__info-value"
                [(ngModel)]="formData[asArray(row)[0].name]"
                [name]="asArray(row)[0].name">

                <option value="" disabled>Seleccionar…</option>
                <option
                  *ngFor="let opt of asArray(row)[0].options"
                  [value]="opt">
                  {{ opt }}
                </option>
              </select>

              <input
                *ngSwitchDefault
                class="modal__info-value"
                [type]="asArray(row)[0].type"
                [name]="asArray(row)[0].name"
                [placeholder]="asArray(row)[0].placeholder || ''"
                [(ngModel)]="formData[asArray(row)[0].name]" />
            </ng-container>
          </div>

          <!-- Campo derecho -->
          <div class="modal__info-item modal__info-item--half">
            <label class="modal__info-label">
              {{ asArray(row)[1].label }}
            </label>

            <ng-container [ngSwitch]="asArray(row)[1].type">
              <select
                *ngSwitchCase="'select'"
                class="modal__info-value"
                [(ngModel)]="formData[asArray(row)[1].name]"
                [name]="asArray(row)[1].name">

                <option value="" disabled>Seleccionar…</option>
                <option
                  *ngFor="let opt of asArray(row)[1].options"
                  [value]="opt">
                  {{ opt }}
                </option>
              </select>

              <input
                *ngSwitchDefault
                class="modal__info-value"
                [type]="asArray(row)[1].type"
                [name]="asArray(row)[1].name"
                [placeholder]="asArray(row)[1].placeholder || ''"
                [(ngModel)]="formData[asArray(row)[1].name]" />
            </ng-container>
          </div>

        </ng-container>

        <!-- CAMPO COMPLETO -->
        <ng-template #fullRow>
          <div class="modal__info-item">
            <label class="modal__info-label">
              {{ asField(row).label }}
            </label>

            <ng-container [ngSwitch]="asField(row).type">
              <select
                *ngSwitchCase="'select'"
                class="modal__info-value"
                [(ngModel)]="formData[asField(row).name]"
                [name]="asField(row).name">

                <option value="" disabled>Seleccionar…</option>
                <option
                  *ngFor="let opt of asField(row).options"
                  [value]="opt">
                  {{ opt }}
                </option>
              </select>

              <input
                *ngSwitchDefault
                class="modal__info-value"
                [type]="asField(row).type"
                [name]="asField(row).name"
                [placeholder]="asField(row).placeholder || ''"
                [(ngModel)]="formData[asField(row).name]" />
            </ng-container>
          </div>
        </ng-template>

      </ng-container>
    </div>

    <!-- FOOTER -->
    <div class="modal__footer">
      <button
        class="modal__btn modal__btn--submit"
        type="button"
        (click)="onSubmit()">
        Guardar cambios
      </button>
    </div>

  </div>
</div>
