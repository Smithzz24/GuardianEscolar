<div class="modal-overlay" (click)="cerrar()">
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal_header">
      <h2 class="modal__title">
        {{ 'update_school.title' | translate }}
      </h2>
    </div>

    <div class="modal_form">

      <!-- Nombre -->
      <div>
        <label class="modal_form-label">
          {{ 'update_school.fields.name' | translate }}
        </label>
        <input type="text" class="modal_form-input"
          [placeholder]="'update_school.fields.name_placeholder' | translate"
          [(ngModel)]="nombreEscuela">
      </div>

      <!-- Ciudad + Dirección -->
      <div class="modal_form-row">
        <div>
          <label class="modal_form-label">
            {{ 'update_school.fields.city' | translate }}
          </label>
          <select [(ngModel)]="ciudad">
            <option value="">
              {{ 'update_school.fields.city_placeholder' | translate }}
            </option>
            <option>Neiva</option>
            <option>Bogotá</option>
            <option>Medellín</option>
            <option>Cali</option>
          </select>
        </div>

        <div>
          <label class="modal_form-label">
            {{ 'update_school.fields.address' | translate }}
          </label>
          <input type="text" class="modal_form-input"
            [placeholder]="'update_school.fields.address_placeholder' | translate"
            [(ngModel)]="direccion">
        </div>
      </div>

      <!-- Teléfono + Logo -->
      <div class="modal_form-row">
        <div>
          <label class="modal_form-label">
            {{ 'update_school.fields.phone' | translate }}
          </label>
          <input type="text" class="modal_form-input"
            [placeholder]="'update_school.fields.phone_placeholder' | translate"
            [(ngModel)]="telefono">
        </div>

        <div class="modal_form-upload">
          <label class="modal_form-label">
            {{ 'update_school.fields.logo' | translate }}
          </label>

          <img src="assets/images/escuela.png" alt="Logo" class="modal_form-logo">

          <label for="logo" class="modal_form-upload-label">
            {{ 'update_school.fields.upload' | translate }}
            <input type="file" id="logo" class="modal_form-upload-input">
          </label>
        </div>
      </div>

      <!-- Correo -->
      <div>
        <label class="modal_form-label">
          {{ 'update_school.fields.email' | translate }}
        </label>
        <input type="email" class="modal_form-input"
          [placeholder]="'update_school.fields.email_placeholder' | translate"
          [(ngModel)]="email">
      </div>

      <!-- Web -->
      <div>
        <label class="modal_form-label">
          {{ 'update_school.fields.web' | translate }}
        </label>
        <input type="text" class="modal_form-input"
          [placeholder]="'update_school.fields.web_placeholder' | translate"
          [(ngModel)]="website">
      </div>

      <!-- Error -->
      <div *ngIf="mostrandoError" class="error-message">
        <mat-icon>error_outline</mat-icon>
        {{ 'update_school.error' | translate }}
      </div>

      <!-- Footer -->
      <div class="modal_footer">
        <button class="modal_btn modal_btn--submit" type="button" (click)="cerrar()">
          {{ 'update_school.buttons.cancel' | translate }}
        </button>

        <button class="modal_btn modal_btn--cancel" type="button" (click)="actualizar()">
          {{ 'update_school.buttons.update' | translate }}
        </button>
      </div>

    </div>
  </div>
</div>

<!-- SUCCESS -->
<div *ngIf="enviado" class="modal-overlay">
  <div class="modal modal--small">
    <div class="modal_header">
      <h2 class="modal__title">
        {{ 'update_school.success.title' | translate }}
      </h2>

      <p class="modal__subtitle">
        {{ 'update_school.success.description' | translate }}
      </p>
    </div>

    <div class="modal_footer modal__footer--center">
      <button class="modal_btn modal_btn--cancel" type="button" (click)="cerrar()">
        {{ 'update_school.buttons.exit' | translate }}
      </button>
    </div>
  </div>
</div>
