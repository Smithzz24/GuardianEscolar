<div class="lang-backdrop" (click)="closeModal()">
  <div class="lang-modal" (click)="$event.stopPropagation()">

    <h3 class="lang-title">Seleccionar idioma</h3>
    <p class="lang-sub">Por favor, elija su idioma preferido para continuar</p>

    <div class="lang-grid">
      <div class="lang-card"
           *ngFor="let lang of language"
           [class.active]="selectedLang === lang.code"
           (click)="selectLang(lang.code)">

        <span class="lang-flag">{{ lang.flag }}</span>
        <div>
          <p class="lang-name">{{ lang.name }}</p>
          <p class="lang-native">{{ lang.native }}</p>
        </div>

        <span class="radio-wrapper">
          <input type="radio" name="lang"
                 [checked]="selectedLang === lang.code"
                 (click)="$event.stopPropagation()" />
          <span class="custom-radio"></span>
        </span>

      </div>
    </div>

    <div class="lang-btns">
      <button class="btn-cancel" (click)="closeModal()">Cancelar</button>
      <button class="btn-confirm" (click)="confirm()">Confirmar</button>
    </div>

  </div>
</div>
