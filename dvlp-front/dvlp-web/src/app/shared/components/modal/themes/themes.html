<div class="modal-backdrop" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">

    <h3>Cambiar tema</h3>
    <p>Selecciona el color del panel</p>

    <!-- CLARO -->
    <div class="light-themes-container">
      <h4>Claro</h4>
      <div class="themes-grid">

        <!-- Azul claro -->
        <div class="theme-card">
          <div class="theme-preview theme-preview-light">
            <div class="theme-sidebar" style="background: #1A56DB;"></div>
            <div class="theme-content">
              <div class="theme-line theme-line-light" style="width: 70%;"></div>
              <div class="theme-line theme-line-light" style="width: 50%;"></div>
              <div class="theme-line theme-line-light" style="width: 60%;"></div>
            </div>
          </div>

          <label class="theme-option">
              <span class="theme-name">Azul</span>

              <span class="radio-wrapper">
                  <input type="radio" name="theme"
                         [checked]="currentTheme === 'light-theme-blue'"
                         (change)="setTheme('light-theme-blue')"/>
                  <span class="custom-radio"></span>
              </span>
          </label>

        </div>

        <!-- Verde claro -->
        <div class="theme-card">
          <div class="theme-preview theme-preview-light">
            <div class="theme-sidebar" style="background: #16A34A;"></div>
            <div class="theme-content">
              <div class="theme-line theme-line-light" style="width: 70%;"></div>
              <div class="theme-line theme-line-light" style="width: 50%;"></div>
              <div class="theme-line theme-line-light" style="width: 60%;"></div>
            </div>
          </div>
          <label class="theme-option">
              <span class="theme-name">Verde</span>

              <span class="radio-wrapper">
                  <input type="radio" name="theme"
                          [checked]="currentTheme === 'light-theme-green'"
                         (change)="setTheme('light-theme-green')" />
                  <span class="custom-radio"></span>
              </span>
          </label>

        </div>

      </div>
    </div>

    <!-- OSCURO -->
    <div class="dark-themes-container">
      <h4>Oscuro</h4>
      <div class="themes-grid">

        <!-- Azul oscuro -->
          <div class="theme-card">
              <div class="theme-preview theme-preview-dark">
                  <div class="theme-sidebar" style="background: #3B82F6;"></div>
                  <div class="theme-content">
                      <div class="theme-line theme-line-dark" style="width: 70%;"></div>
                      <div class="theme-line theme-line-dark" style="width: 50%;"></div>
                      <div class="theme-line theme-line-dark" style="width: 60%;"></div>
                  </div>
              </div>
              <label class="theme-option">
                  <span class="theme-name">Azul</span>

                  <span class="radio-wrapper">
                      <input type="radio" name="theme"
                             [checked]="currentTheme === 'dark-theme-blue'"
                             (change)="setTheme('dark-theme-blue')"/>
                      <span class="custom-radio"></span>
                  </span>
              </label>

          </div>

        <!-- Verde oscuro -->
        <div class="theme-card">
          <div class="theme-preview theme-preview-dark">
            <div class="theme-sidebar" style="background: #22C55E;"></div>
            <div class="theme-content">
              <div class="theme-line theme-line-dark" style="width: 70%;"></div>
              <div class="theme-line theme-line-dark" style="width: 50%;"></div>
              <div class="theme-line theme-line-dark" style="width: 60%;"></div>
            </div>
          </div>
          <label class="theme-option">
              <span class="theme-name">Verde</span>

              <span class="radio-wrapper">
                  <input type="radio" name="theme"
                         [checked]="currentTheme === 'dark-theme-green'"
                         (change)="setTheme('dark-theme-green')"/>
                  <span class="custom-radio"></span>
              </span>
          </label>
        </div>

      </div>
    </div>

    <div class="btn-themes">
    <button class="close-btn" (click)="closeModal()">Cancelar</button>
    <button class="apply-btn" (click)="closeModal()">Aplicar</button>
    </div>
  </div>
</div>
