<app-navbar-manage></app-navbar-manage>
<!-- CONTENIDO PRINCIPAL -->
<div class="page-wrapper">
  <app-sidebar-superadmin></app-sidebar-superadmin>
  <div class="container">
    <app-card-register type="schools"></app-card-register>
    <app-card-list type="schools" 
    (viewItem)="showDetails($event)" 
    (editItem)="showUpdate($event)"
    (deleteItem)="showDelete($event)">
  </app-card-list>
  </div>
</div>

<!-- Modal de detalles a nivel de página -->
<app-record-information 
  *ngIf="showModal"
  type="schools"
  [record]="schoolSelected"
  (closed)="closeModal()">
</app-record-information>

<app-update-record
  *ngIf="showUpdateModal"
  type="schools"
  [record]="schoolSelected"
  (saved)="onSaved($event)"
  (closed)="closeUpdateModal()">
</app-update-record>

<!-- Modal: eliminar registro -->
<app-delete-record
  *ngIf="showDeleteModal"
  type="schools"
  [record]="schoolSelected"
  (confirm)="onConfirmDelete($event)"
  (cancel)="closeDeleteModal()">  
  
</app-delete-record>
