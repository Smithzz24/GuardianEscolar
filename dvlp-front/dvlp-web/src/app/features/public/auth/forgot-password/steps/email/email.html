<app-change-password iconHead="mail" title="Recupera tu acceso"
  sessionDescription="Te enviaremos un código de verificación a tu correo registrado."
  titleStep="Restablecer contraseña" loginDescription="Ingresa el correo con el que te registraste"
  buttonText="Enviar código" returnStep="Volver al inicio de sesión" (return)="return()" [showProgress]="true" [currentStep]="1" stepText="1 de 3" (submit)="onSubmit()">
 
  <form action="" [formGroup]="form">
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" formControlName="email">
    <!-- Muestra mensaje si el usuario entro y salio del campo -->
    <!-- y si el formato de email es invalido -->
    @if (form.get('email')?.touched && form.get('email')?.errors?.['email']) {
    <small class="error">*Debe ser un email valido</small>
    }
    <!-- Muestrra el mensaje si el usuarios toco el campo -->
    <!-- y si lo dejo vacio -->
    @if (form.get('email')?.touched && form.get('email')?.errors?.['required']) {
    <small class="error">*El email es requerido</small>
    }
    <p>Recibirás un código de 6 dígitos</p>
  </form>
  
</app-change-password>
