<app-navbar-manage backRoute="/dashboard-admin"></app-navbar-manage>
<!-- CONTENIDO PRINCIPAL -->
<div class="page-wrapper">
  <app-navbar-admin></app-navbar-admin>
  <div class="container">
    <app-card-register type="acudiente"></app-card-register>
    <app-card-list type="acudiente" 
    (viewItem)="showDetails($event)" 
    (editItem)="showUpdate($event)"
    (deleteItem)="showDelete($event)">
  </app-card-list>
  </div>
</div>

<!-- Modal de detalles a nivel de página -->
<app-record-information *ngIf="showModal" type="acudiente" [record]="attendantSelected" (closed)="closeModal()">
</app-record-information>

<!-- Modal: actualizar registro -->
<app-update-record
  *ngIf="showUpdateModal"
  type="acudiente"
  [record]="attendantSelected"
  (saved)="onSaved($event)"
  (closed)="closeUpdateModal()">
</app-update-record>

<!-- Modal: eliminar registro -->
<app-delete-record
  *ngIf="showDeleteModal"
  type="acudiente"
  [record]="attendantSelected"
  (confirm)="onConfirmDelete($event)"
  (cancel)="closeDeleteModal()">  
  
</app-delete-record>
