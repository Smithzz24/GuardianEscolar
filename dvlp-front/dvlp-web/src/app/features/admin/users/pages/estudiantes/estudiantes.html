<app-navbar-manage backRoute="/dashboard-admin"></app-navbar-manage>
<!-- CONTENIDO PRINCIPAL -->
<div class="page-wrapper">
  <app-navbar-admin></app-navbar-admin>
  <div class="container">
    <app-card-register type="estudiante"></app-card-register>
    <app-card-list type="estudiante" (viewItem)="showDetails($event)"></app-card-list>
  </div>
</div>

<!-- Modal de detalles a nivel de página -->
<app-record-information 
  *ngIf="showModal"
  type="estudiante"
  [record]="studentSelected"
  (closed)="closeModal()">
</app-record-information>
