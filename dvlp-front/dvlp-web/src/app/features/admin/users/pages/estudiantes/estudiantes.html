<!-- ── estudiantes.html (ejemplo de integración) ─────────────────────────── -->
<app-navbar-manage backRoute="/dashboard-admin"></app-navbar-manage>

<div class="page-wrapper">
  <app-navbar-admin></app-navbar-admin>
  <div class="container">
    <app-card-register type="estudiante"></app-card-register>
    <app-card-list
      type="estudiante"
      (viewItem)="showDetails($event)"
      (editItem)="showUpdate($event)"
      (deleteItem)="showDelete($event)">
    </app-card-list>
  </div>
</div>

<!-- Modal: ver detalles -->
<app-record-information
  *ngIf="showModal"
  type="estudiante"
  [record]="studentSelected"
  (closed)="closeModal()">
</app-record-information>

<!-- Modal: actualizar registro -->
<app-update-record
  *ngIf="showUpdateModal"
  type="estudiante"
  [record]="studentSelected"
  (saved)="onSaved($event)"
  (closed)="closeUpdateModal()">
</app-update-record>

<!-- Modal: eliminar registro -->
<app-delete-record
  *ngIf="showDeleteModal"
  type="estudiante"
  [record]="studentSelected"
  (confirm)="onConfirmDelete($event)"
  (cancel)="closeDeleteModal()">  
</app-delete-record>
