<app-change-information
  iconHead="lock"
  [title]="'change_email.code_first.title' | translate"
  [sessionDescription]="'change_email.code_first.sessionDescription' | translate"
  [titleStep]="'change_email.code_first.titleStep' | translate"
  [buttonText]="'change_email.code_first.buttonText' | translate"
  [returnStep]="'change_email.code_first.returnStep' | translate"
  (return)="return()"
  [showProgress]="true"
  [currentStep]="2"
  (submit)="onSubmit()"
  [stepText]="'change_email.code_first.stepText' | translate"
>
  <div class="login-description">
    <span>{{ 'change_email.code_first.description' | translate }}</span>
  </div>
  <form action="" [formGroup]="form">
    <div class="input-pin">
      <div class="pin-inputs">
        <input
          class="pin-input"
          *ngFor="let ctrl of pinControls.controls; let i = index"
          [formControl]="ctrl"
          maxlength="1"
          (input)="onInput($event, i)"
        />
      </div>
      @if (form.invalid && form.touched) {
        <small class="error">{{ 'change_email.code_first.pin_error' | translate }}</small>
      }
    </div>
  </form>
</app-change-information>
