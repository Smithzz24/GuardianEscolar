<app-change-information
  iconHead="lock"
  [title]="'change_contact.code_second.title' | translate"
  [sessionDescription]="'change_contact.code_second.sessionDescription' | translate"
  [titleStep]="'change_contact.code_second.titleStep' | translate"
  loginDescription=""
  [buttonText]="'change_contact.code_second.buttonText' | translate"
  [returnStep]="'change_contact.code_second.returnStep' | translate"
  (return)="return()"
  [showProgress]="true"
  [currentStep]="4"
  [stepText]="'change_contact.code_second.stepText' | translate"
  (submit)="onSubmit()"
>
  <div class="login-description">
    <span>{{ 'change_contact.code_second.description' | translate }}</span>
  </div>

  <form action="" [formGroup]="form">
    <div class="input-pin">
      <div class="pin-inputs">
        <input
          class="pin-input"
          *ngFor="let ctrl of pinControls.controls; let i = index"
          [formControl]="ctrl"
          maxlength="1"
          (input)="onInput($event, i)"
        />
      </div>
      @if (form.invalid && form.touched) {
        <small class="error">{{ 'change_contact.code_second.pin_error' | translate }}</small>
      }
    </div>
  </form>
</app-change-information>
